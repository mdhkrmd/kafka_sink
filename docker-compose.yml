# docker-compose-target.yml
services:
  kafka-target:
    image: apache/kafka:3.9.0
    container_name: kafka-target
    hostname: kafka-target
    userns_mode: keep-id
    ports:
      - "29092:29092" # Port host diubah ke 29092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-target:19093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER


      # LISTENERS
      KAFKA_LISTENERS: INTERNAL://:9093,SASL://:9094,SSL://:9095,SASLSSL://:9096,EXTERNAL://:29092,CONTROLLER://:19093

      # 🔥 WAJIB: advertised harus explicit & clean
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-target:9093,SASL://kafka-target:9094,SSL://kafka-target:9095,SASLSSL://kafka-target:9096,EXTERNAL://localhost:29092

      # PROTOCOL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,SASL:SASL_PLAINTEXT,SSL:SSL,SASLSSL:SASL_SSL,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_LISTENER_NAME_SASL_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="target-user" password="target-pass" user_target-user="target-pass";
      KAFKA_LISTENER_NAME_SASLSSL_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="target-user" password="target-pass" user_target-user="target-pass";
      KAFKA_SSL_KEYSTORE_FILENAME: target.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: target.keystore.credentials
      KAFKA_SSL_KEY_CREDENTIALS: target.key.credentials
      KAFKA_SSL_TRUSTSTORE_FILENAME: target.truststore.jks
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: target.truststore.credentials
      KAFKA_SSL_CLIENT_AUTH: none
      
      # INTER BROKER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      
      # SINGLE NODE
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      
      # OPTIONAL (biar gak aneh-aneh)
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: target-cluster

    volumes:
      - ./secrets:/etc/kafka/secrets:ro,z

    networks:
      - knet_main

  kconnect-target:
    build:
      context: ../cdc-engine-lineage
      dockerfile: Dockerfile
    image: cdc-engine-lineage-kconnect:latest
    userns_mode: keep-id:uid=1001,gid=1001
    container_name: kconnect-target
    ports:
      - "8084:8083" # Port host diubah ke 8084
    environment:
      REST_ADVERTISED_HOST_NAME: connect-target
      BOOTSTRAP_SERVERS: kafka-target:9093
      REST_PORT: 8083
      GROUP_ID: connect-cluster-target
      CONFIG_STORAGE_TOPIC: connect-configs-target
      CONFIG_STORAGE_REPLICATION_FACTOR: -1
      OFFSET_STORAGE_TOPIC: connect-offsets-target
      OFFSET_STORAGE_REPLICATION_FACTOR: -1
      STATUS_STORAGE_TOPIC: connect-status-target
      STATUS_STORAGE_REPLICATION_FACTOR: -1
      CONNECT_SCHEDULED_REBALANCE_MAX_DELAY_MS: 0
      CONFIG_PROVIDERS: file
      CONFIG_PROVIDERS_FILE_CLASS: org.apache.kafka.common.config.provider.FileConfigProvider
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      PLUGIN_PATH: /kafka/connect
    volumes:
      - ./secrets:/kafka/secrets:ro,z
      - ../unem-cdc-dashboard/uploads/connect-secrets:/kafka/secrets/uploads:ro,z
    networks:
      - knet_main

  schema-registry-target:
    image: confluentinc/cp-schema-registry:8.0.0
    container_name: schema-registry-target
    hostname: schema-registry-target
    ports:
      - "8082:8081" # Port host diubah ke 8082
    depends_on:
      - kafka-target
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry-target
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka-target:9093"
    networks:
      - knet_main
  
  kafka-ui-target:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-target
    depends_on:
      - kafka-target
    ports:
      - "8090:8080" # Port host diubah ke 8090
    environment:
      KAFKA_CLUSTERS_0_NAME: "Target Cluster"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-target:9093"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://schema-registry-target:8081"
    networks:
      - knet_main

networks:
  knet_main:
    name: cdc_kafka_net
    external: true

volumes:
  mssql_data_target:
  postgres_data_target:
